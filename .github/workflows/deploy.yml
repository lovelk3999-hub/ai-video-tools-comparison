name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 8 1 * *"   # Monthly on 1st at 8am UTC
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Need full history for commit-and-push
          fetch-depth: 0
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      
      - name: Install Playwright
        run: |
          pip install playwright
          playwright install chromium
      
      - name: Auto-update pricing data
        run: python scripts/update_pricing.py
      
      - name: Generate static site
        run: python scripts/generate.py
      
      - name: Commit pricing changes (if any)
        run: |
          git config user.name "price-bot"
          git config user.email "price-bot@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "auto: update pricing data [skip ci]"
            git push
          fi
      
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: pages deploy output --project-name=ai-video-tools
